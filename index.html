<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Social links profile</title>
</head>
<body>
<section class="card" role="card">
  <img src="assets/images/avatar-jessica.jpeg" alt="Jessica Avatar">
  <h1>Jessica Randall</h1>
  <p class="location">London, United Kingdom</p>
  <p class="description">"Front-end developer and avid reader."</p>
  <div class="buttons">
    <button type="button" id="btn-1" tabindex="1">GitHub</button>
    <button type="button" id="btn-2" tabindex="2">Frontend Mentor</button>
    <button type="button" id="btn-3" tabindex="3">LinkedIn</button>
    <button type="button" id="btn-4" tabindex="4">Twitter</button>
    <button type="button" id="btn-5" tabindex="5">Instagram</button>
  </section>
</div>
</body>
</html>
