<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Social links profile</title>
</head>
<body>
<div class="card">
  <img src="assets/images/avatar-jessica.jpeg">
  <h1>Jessica Randall</h1>
  <p id="location">London, United Kingdom</p>
  <p id="description">"Front-end developer and avid reader."</p>
  <div class="buttons">
    <button tabindex="0">GitHub</button>
    <button tabindex="0">Frontend Mentor</button>
    <button tabindex="0">LinkedIn</button>
    <button tabindex="0">Twitter</button>
    <button tabindex="0">Instagram</button>
  </div>
</div>
</body>
</html>
